<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tareas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <header class="app__header">
      <h1 class="app__title">Mis Tareas</h1>
      <p class="app__subtitle">Organiza tu día a día</p>
    </header>

    <section class="task-form">
      <input type="text" id="task-input" class="task-form__input" placeholder="Escribe una nueva tarea...">
      <input type="date" id="task-date" class="task-form__date">
      <button id="add-task-btn" class="task-form__button">Agregar</button>
    </section>

    <section class="task-summary">
      <span id="completed-count">0</span> tareas completadas de <span id="total-count">0</span>
    </section>

    <main class="task-list-container">
      <ul id="task-list" class="task-list">
        <!-- Las tareas se insertan aquí dinámicamente -->
      </ul>
    </main>

    <footer class="app__footer">
      <p>Equipo: Programador 1 · Programador 2 · Programador 3 · Programador 4</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
